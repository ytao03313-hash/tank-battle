<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>坦克大战 - Tank Battle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a1a;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
      color: #fff;
    }
    canvas {
      display: block;
      background: #0d1f0d;
    }
    #ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #hud {
      position: absolute;
      top: 15px;
      left: 15px;
      font-size: 18px;
      text-shadow: 2px 2px 0 #000;
      line-height: 1.6;
    }
    #hud span {
      color: #ffcc00;
    }
    #screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      text-shadow: 3px 3px 0 #000;
    }
    #screen h1 {
      font-size: 56px;
      color: #ffcc00;
      margin-bottom: 20px;
    }
    #screen h2 {
      font-size: 40px;
      margin-bottom: 15px;
    }
    #screen p {
      font-size: 20px;
      margin: 10px 0;
      color: #ddd;
    }
    #screen .controls {
      margin-top: 25px;
      padding: 15px 25px;
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid #555;
      border-radius: 8px;
      display: inline-block;
      text-align: left;
    }
    #screen .controls p {
      font-size: 16px;
      margin: 6px 0;
    }
    .blink {
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    #muteBtn {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #555;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      pointer-events: auto;
      transition: border-color 0.2s, background 0.2s;
    }
    #muteBtn:hover {
      border-color: #ffcc00;
      background: rgba(0, 0, 0, 0.8);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui">
    <div id="hud" style="display:none;">
      <div>分数: <span id="score">0</span></div>
      <div>生命: <span id="lives">3</span></div>
      <div>关卡: <span id="level">1</span></div>
      <div>敌人: <span id="enemies">0</span></div>
    </div>
    <button id="muteBtn">🔊 音效</button>
    <div id="screen">
      <h1>坦克大战</h1>
      <h2>TANK BATTLE</h2>
      <p class="blink">按 ENTER 开始游戏</p>
      <div class="controls">
        <p><strong>WASD / 方向键</strong> - 移动坦克</p>
        <p><strong>空格键</strong> - 开火</p>
        <p><strong>M 键</strong> - 切换音效</p>
        <p>消灭所有敌人坦克即可获胜</p>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const hud = document.getElementById('hud');
    const screen = document.getElementById('screen');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const levelEl = document.getElementById('level');
    const enemiesEl = document.getElementById('enemies');

    const muteBtn = document.getElementById('muteBtn');

    let width, height;
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2, WIN: 3 };

    class Input {
      constructor() {
        this.keys = {};
        window.addEventListener('keydown', e => {
          this.keys[e.code] = true;
          if (e.code === 'Enter' && game.state !== STATE.PLAYING) {
            game.start();
          }
          if (e.code === 'KeyM') {
            game.sound.toggle();
            muteBtn.textContent = game.sound.enabled ? '🔊 音效' : '🔇 音效';
          }
        });
        window.addEventListener('keyup', e => this.keys[e.code] = false);
      }
      down(code) { return !!this.keys[code]; }
    }

    class Sound {
      constructor() {
        this.ctx = null;
        this.enabled = true;
      }
      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      }
      toggle() {
        this.enabled = !this.enabled;
        return this.enabled;
      }
      playShoot() {
        if (!this.enabled || !this.ctx) return;
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(880, t);
        osc.frequency.exponentialRampToValueAtTime(220, t + 0.12);
        gain.gain.setValueAtTime(0.12, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(t);
        osc.stop(t + 0.12);
      }
      playExplosion() {
        if (!this.enabled || !this.ctx) return;
        const t = this.ctx.currentTime;
        const duration = 0.35;
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1200, t);
        filter.frequency.exponentialRampToValueAtTime(80, t + duration);
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.35, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);
        noise.start(t);
        noise.stop(t + duration);
      }
      playHit() {
        if (!this.enabled || !this.ctx) return;
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(220, t);
        osc.frequency.exponentialRampToValueAtTime(50, t + 0.08);
        gain.gain.setValueAtTime(0.18, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(t);
        osc.stop(t + 0.08);
      }
      playStart() {
        if (!this.enabled || !this.ctx) return;
        const t = this.ctx.currentTime;
        [330, 392, 494, 659].forEach((freq, i) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, t + i * 0.08);
          gain.gain.linearRampToValueAtTime(0.15, t + i * 0.08 + 0.03);
          gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.25);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(t + i * 0.08);
          osc.stop(t + i * 0.08 + 0.3);
        });
      }
      playWin() {
        if (!this.enabled || !this.ctx) return;
        const t = this.ctx.currentTime;
        [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'square';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, t + i * 0.12);
          gain.gain.linearRampToValueAtTime(0.15, t + i * 0.12 + 0.04);
          gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.35);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(t + i * 0.12);
          osc.stop(t + i * 0.12 + 0.4);
        });
      }
      playGameOver() {
        if (!this.enabled || !this.ctx) return;
        const t = this.ctx.currentTime;
        [440, 349.23, 293.66, 220].forEach((freq, i) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.15, t + i * 0.25);
          gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.25 + 0.22);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(t + i * 0.25);
          osc.stop(t + i * 0.25 + 0.25);
        });
      }
    }

    class Particle {
      constructor(x, y, color, speed, life) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.angle = Math.random() * Math.PI * 2;
        this.speed = (Math.random() * 0.5 + 0.5) * speed;
        this.life = life;
        this.maxLife = life;
        this.size = Math.random() * 3 + 1;
      }
      update() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
        this.life--;
      }
      draw(ctx) {
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      get dead() { return this.life <= 0; }
    }

    class Bullet {
      constructor(x, y, angle, owner) {
        this.x = x;
        this.y = y;
        this.angle = angle;
        this.speed = 7;
        this.owner = owner;
        this.radius = 3;
        this.life = 120;
        this.dead = false;
      }
      update() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
        this.life--;
        if (this.life <= 0 || this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
          this.dead = true;
        }
      }
      draw(ctx) {
        ctx.fillStyle = this.owner === 'player' ? '#ffff00' : '#ff5555';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
      }
      getBounds() {
        return { x: this.x - this.radius, y: this.y - this.radius, w: this.radius * 2, h: this.radius * 2 };
      }
    }

    class Wall {
      constructor(x, y, size, health = 2) {
        this.x = x;
        this.y = y;
        this.size = size;
        this.health = health;
        this.maxHealth = health;
        this.dead = false;
      }
      hit() {
        this.health--;
        if (this.health <= 0) this.dead = true;
      }
      draw(ctx) {
        const gray = 60 + (this.maxHealth - this.health) * 40;
        ctx.fillStyle = `rgb(${gray}, ${gray}, ${gray})`;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x, this.y, this.size, this.size);
        if (this.health < this.maxHealth) {
          ctx.fillStyle = '#ff5555';
          ctx.fillRect(this.x + 2, this.y + 2, (this.size - 4) * (this.health / this.maxHealth), 3);
        }
      }
      getBounds() {
        return { x: this.x, y: this.y, w: this.size, h: this.size };
      }
    }

    class Tank {
      constructor(x, y, size, color, speed) {
        this.x = x;
        this.y = y;
        this.size = size;
        this.color = color;
        this.speed = speed;
        this.angle = 0;
        this.cooldown = 0;
        this.dead = false;
        this.invulnerable = 0;
      }
      moveForward() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
      }
      moveBackward() {
        this.x -= Math.cos(this.angle) * this.speed;
        this.y -= Math.sin(this.angle) * this.speed;
      }
      rotateLeft() {
        this.angle -= 0.06;
      }
      rotateRight() {
        this.angle += 0.06;
      }
      shoot() {
        if (this.cooldown > 0) return null;
        this.cooldown = this.fireRate;
        const cx = this.x + this.size / 2;
        const cy = this.y + this.size / 2;
        const bx = cx + Math.cos(this.angle) * (this.size / 2 + 8);
        const by = cy + Math.sin(this.angle) * (this.size / 2 + 8);
        return new Bullet(bx, by, this.angle, this.owner);
      }
      update() {
        if (this.cooldown > 0) this.cooldown--;
        if (this.invulnerable > 0) this.invulnerable--;
      }
      draw(ctx) {
        ctx.save();
        ctx.translate(this.x + this.size / 2, this.y + this.size / 2);
        ctx.rotate(this.angle);
        if (this.invulnerable > 0 && Math.floor(Date.now() / 100) % 2 === 0) {
          ctx.globalAlpha = 0.5;
        }
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
        ctx.fillStyle = '#000';
        ctx.fillRect(-this.size / 4, -this.size / 4, this.size / 2, this.size / 2);
        ctx.fillStyle = this.color;
        ctx.fillRect(0, -this.size / 6, this.size / 2 + 6, this.size / 3);
        ctx.restore();
        ctx.globalAlpha = 1;
      }
      getBounds() {
        return { x: this.x, y: this.y, w: this.size, h: this.size };
      }
      center() {
        return { x: this.x + this.size / 2, y: this.y + this.size / 2 };
      }
    }

    class Player extends Tank {
      constructor(x, y) {
        super(x, y, 34, '#4caf50', 2.5);
        this.owner = 'player';
        this.fireRate = 20;
        this.lives = 3;
      }
      update(input) {
        super.update();
        if (input.down('KeyW') || input.down('ArrowUp')) this.moveForward();
        if (input.down('KeyS') || input.down('ArrowDown')) this.moveBackward();
        if (input.down('KeyA') || input.down('ArrowLeft')) this.rotateLeft();
        if (input.down('KeyD') || input.down('ArrowRight')) this.rotateRight();
        if (input.down('Space')) {
          const bullet = this.shoot();
          if (bullet) {
            game.bullets.push(bullet);
            game.sound.playShoot();
          }
        }
      }
      respawn() {
        this.lives--;
        if (this.lives > 0) {
          const pos = game.findSpawn('player');
          this.x = pos.x;
          this.y = pos.y;
          this.angle = 0;
          this.invulnerable = 120;
        } else {
          this.dead = true;
        }
      }
    }

    class Enemy extends Tank {
      constructor(x, y, level) {
        super(x, y, 34, '#d32f2f', 1.2 + level * 0.15);
        this.owner = 'enemy';
        this.fireRate = 70 - level * 5;
        this.turnTimer = 0;
        this.shootTimer = 0;
      }
      update(player, walls) {
        super.update();
        const myCenter = this.center();
        const pCenter = player.center();
        const dx = pCenter.x - myCenter.x;
        const dy = pCenter.y - myCenter.y;
        const dist = Math.hypot(dx, dy);
        const targetAngle = Math.atan2(dy, dx);

        if (dist < 250) {
          let diff = targetAngle - this.angle;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          if (Math.abs(diff) > 0.05) {
            if (diff > 0) this.rotateRight();
            else this.rotateLeft();
          }
          if (dist > 80) this.moveForward();
          if (Math.abs(diff) < 0.3) {
            const bullet = this.shoot();
            if (bullet) {
              game.bullets.push(bullet);
              game.sound.playShoot();
            }
          }
        } else {
          this.turnTimer--;
          if (this.turnTimer <= 0) {
            this.turnTimer = 80 + Math.random() * 80;
            this.angle += (Math.random() - 0.5) * Math.PI;
          }
          this.moveForward();
        }
      }
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    class Game {
      constructor() {
        this.input = new Input();
        this.sound = new Sound();
        this.state = STATE.MENU;
        this.score = 0;
        this.level = 1;
        this.player = null;
        this.enemies = [];
        this.walls = [];
        this.bullets = [];
        this.particles = [];
        this.shake = 0;

        muteBtn.addEventListener('click', () => {
          const on = this.sound.toggle();
          muteBtn.textContent = on ? '🔊 音效' : '🔇 音效';
        });
      }

      findSpawn(type) {
        if (type === 'player') return { x: 60, y: 60 };
        const margin = 60;
        return {
          x: width - margin - Math.random() * 200,
          y: height - margin - Math.random() * 200
        };
      }

      generateLevel(level) {
        this.walls = [];
        const cols = Math.floor(width / 44);
        const rows = Math.floor(height / 44);
        for (let r = 2; r < rows - 2; r += 2) {
          for (let c = 2; c < cols - 2; c += 2) {
            if (Math.random() < 0.35 + level * 0.05) {
              const x = c * 44;
              const y = r * 44;
              if (Math.hypot(x - 60, y - 60) > 120 && Math.hypot(x - (width - 80), y - (height - 80)) > 120) {
                this.walls.push(new Wall(x, y, 38, 1 + Math.floor(Math.random() * 2)));
              }
            }
          }
        }
      }

      start() {
        this.sound.init();
        this.state = STATE.PLAYING;
        this.score = 0;
        this.level = 1;
        this.loadLevel(1);
        hud.style.display = 'block';
        this.updateHud();
        this.sound.playStart();
      }

      loadLevel(level) {
        this.level = level;
        this.bullets = [];
        this.particles = [];
        this.player = new Player(60, 60);
        this.generateLevel(level);
        const count = 2 + level * 2;
        this.enemies = [];
        for (let i = 0; i < count; i++) {
          let pos = this.findSpawn('enemy');
          let enemy = new Enemy(pos.x, pos.y, level);
          let tries = 0;
          while (this.collidesWithWalls(enemy.getBounds()) && tries < 20) {
            pos = this.findSpawn('enemy');
            enemy.x = pos.x;
            enemy.y = pos.y;
            tries++;
          }
          this.enemies.push(enemy);
        }
        this.updateHud();
      }

      nextLevel() {
        if (this.level >= 3) {
          this.state = STATE.WIN;
          this.sound.playWin();
          this.showScreen('win');
        } else {
          this.loadLevel(this.level + 1);
        }
      }

      gameOver() {
        this.state = STATE.GAMEOVER;
        this.sound.playGameOver();
        this.showScreen('gameover');
      }

      showScreen(type) {
        hud.style.display = 'none';
        if (type === 'gameover') {
          screen.innerHTML = `
            <h2>游戏结束</h2>
            <p>最终分数: <span style="color:#ffcc00;font-size:28px;">${this.score}</span></p>
            <p class="blink">按 ENTER 重新开始</p>
          `;
        } else if (type === 'win') {
          screen.innerHTML = `
            <h2>胜利！</h2>
            <p>最终分数: <span style="color:#ffcc00;font-size:28px;">${this.score}</span></p>
            <p class="blink">按 ENTER 重新开始</p>
          `;
        }
      }

      updateHud() {
        scoreEl.textContent = this.score;
        livesEl.textContent = this.player ? this.player.lives : 0;
        levelEl.textContent = this.level;
        enemiesEl.textContent = this.enemies.length;
      }

      collidesWithWalls(bounds, exclude = null) {
        if (bounds.x < 0 || bounds.x + bounds.w > width || bounds.y < 0 || bounds.y + bounds.h > height) {
          return true;
        }
        for (const wall of this.walls) {
          if (wall !== exclude && rectsOverlap(bounds, wall.getBounds())) return true;
        }
        return false;
      }

      resolveWallCollision(tank, prevX, prevY) {
        const bounds = tank.getBounds();
        if (this.collidesWithWalls(bounds)) {
          tank.x = prevX;
          tank.y = prevY;
        }
      }

      spawnExplosion(x, y, color, count = 12) {
        this.sound.playExplosion();
        for (let i = 0; i < count; i++) {
          this.particles.push(new Particle(x, y, color, Math.random() * 4 + 2, 30 + Math.random() * 20));
        }
      }

      update() {
        if (this.state !== STATE.PLAYING) return;

        const prevX = this.player.x;
        const prevY = this.player.y;
        this.player.update(this.input);
        this.resolveWallCollision(this.player, prevX, prevY);

        for (let i = this.enemies.length - 1; i >= 0; i--) {
          const enemy = this.enemies[i];
          const ex = enemy.x, ey = enemy.y;
          enemy.update(this.player, this.walls);
          this.resolveWallCollision(enemy, ex, ey);
          if (rectsOverlap(enemy.getBounds(), this.player.getBounds())) {
            enemy.x = ex;
            enemy.y = ey;
          }
        }

        for (const bullet of this.bullets) bullet.update();

        for (let i = this.bullets.length - 1; i >= 0; i--) {
          const b = this.bullets[i];
          if (b.dead) {
            this.bullets.splice(i, 1);
            continue;
          }
          const bb = b.getBounds();

          for (let w = this.walls.length - 1; w >= 0; w--) {
            const wall = this.walls[w];
            if (rectsOverlap(bb, wall.getBounds())) {
              wall.hit();
              this.spawnExplosion(b.x, b.y, '#aaaaaa', 5);
              if (wall.dead) {
                this.score += 10;
                this.walls.splice(w, 1);
              } else {
                this.sound.playHit();
              }
              this.bullets.splice(i, 1);
              break;
            }
          }
          if (i >= this.bullets.length) continue;

          if (b.owner === 'player') {
            for (let e = this.enemies.length - 1; e >= 0; e--) {
              const enemy = this.enemies[e];
              if (rectsOverlap(bb, enemy.getBounds())) {
                this.spawnExplosion(enemy.center().x, enemy.center().y, '#ff5555', 20);
                this.enemies.splice(e, 1);
                this.score += 100;
                this.bullets.splice(i, 1);
                this.shake = 8;
                break;
              }
            }
          } else if (b.owner === 'enemy') {
            if (this.player.invulnerable <= 0 && rectsOverlap(bb, this.player.getBounds())) {
              this.spawnExplosion(this.player.center().x, this.player.center().y, '#4caf50', 20);
              this.bullets.splice(i, 1);
              this.shake = 10;
              this.player.respawn();
              if (this.player.dead) {
                this.gameOver();
              }
            }
          }
        }

        for (let i = this.particles.length - 1; i >= 0; i--) {
          this.particles[i].update();
          if (this.particles[i].dead) this.particles.splice(i, 1);
        }

        if (this.enemies.length === 0) {
          this.nextLevel();
        }

        if (this.shake > 0) this.shake--;
        this.updateHud();
      }

      draw() {
        ctx.fillStyle = '#0d1f0d';
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        if (this.shake > 0) {
          const s = this.shake * 0.6;
          ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
        }

        for (const wall of this.walls) wall.draw(ctx);
        for (const bullet of this.bullets) bullet.draw(ctx);
        for (const particle of this.particles) particle.draw(ctx);
        if (this.player && !this.player.dead) this.player.draw(ctx);
        for (const enemy of this.enemies) enemy.draw(ctx);

        ctx.restore();
      }

      loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
      }
    }

    const game = new Game();
    game.loop();
  </script>
</body>
